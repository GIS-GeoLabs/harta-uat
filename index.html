<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Hartă România</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    #map {
      height: 100vh;
      width: 100vw;
    }

    /* LABEL JUDEȚ */
    .leaflet-tooltip.label-judet {
      background: none;
      border: none;
      box-shadow: none;
      color: #000;
      font-size: 13px;
      font-weight: 600;
      pointer-events: none;
      white-space: nowrap;
      text-align: center;
    }

    /* LABEL UAT */
    .leaflet-tooltip.label-uat {
      background: none;
      border: none;
      box-shadow: none;
      color: #000;
      font-size: 10px;
      pointer-events: none;
      white-space: nowrap;
    }

    .label-hover {
      font-size: 11px;
      font-weight: 600;
    }

    #backBtn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      padding: 6px 12px;
      background: white;
      border: 1px solid #999;
      cursor: pointer;
      display: none;
    }
  </style>
</head>

<body>

  <div id="map"></div>
  <button id="backBtn">Înapoi la județe</button>

  <!-- LIBRARII -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/polylabel@1.1.0/polylabel.min.js"></script>

  <!-- APP -->
  <script src="app.js"></script>

</body>
</html>
